<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKG Portal - Vercel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="pages.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="app">
        <div class="h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/proxy';

        const google = {
            script: {
                run: {
                    withSuccessHandler: function(cb) { this._success = cb; return this; },
                    withFailureHandler: function(cb) { this._failure = cb; return this; },
                    _call: async function(action, args) {
                        try {
                            const url = new URL(window.location.origin + API_URL);
                            url.searchParams.append('action', action);
                            if (args.length > 0 && typeof args[0] === 'object') {
                                Object.keys(args[0]).forEach(k => url.searchParams.append(k, args[0][k]));
                            }
                            const res = await fetch(url);
                            const data = await res.json();
                            if (this._success) this._success(data);
                        } catch (e) { console.error(e); if (this._failure) this._failure(e); }
                    },
                    login: function(...a) { this._call('login', a); },
                    getEventAktif: function(...a) { this._call('getEventAktif', a); },
                    getDashboardStats: function(...a) { this._call('getDashboardStats', a); },
                    getListGuru: function(...a) { this._call('getListGuru', a); },
                    getDaftarHadirByTanggal: function(...a) { this._call('getDaftarHadirByTanggal', a); },
                    simpanAbsensi: function(...a) { this._call('simpanAbsensi', a); },
                }
            }
        };

        function navigate(page) {
            const template = PAGES[page] || `<h1>404</h1>`;
            document.getElementById('app').innerHTML = eval('`'+template+'`');
            
            if (page === 'login') initLogin();
            if (page === 'dashboard') initDashboard();
            if (page === 'hadir') initDaftarHadir();
            if (page === 'guru') initDataGuru();
            window.scrollTo(0,0);
        }

        function logout() { localStorage.removeItem('userKKG'); navigate('login'); }

        function initLogin() {
            const form = document.getElementById('loginForm');
            if (!form) return;
            form.onsubmit = (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.disabled = true; btn.innerHTML = 'OTENTIKASI...';
                google.script.run.withSuccessHandler((res) => {
                    if (res && res.success) {
                        localStorage.setItem('userKKG', JSON.stringify(res));
                        navigate('dashboard');
                    } else {
                        alert('Login Gagal: ' + (res?.error || 'Email/Password Salah'));
                        btn.disabled = false; btn.innerHTML = 'MASUK';
                    }
                }).login({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            };
        }

        function initDashboard() {
            google.script.run.withSuccessHandler((event) => {
                const container = document.getElementById('dashboardContent');
                if (!container) return;
                
                let html = '';
                if (event && !event.error) {
                    html = `
                        <div class="bg-blue-600 rounded-2xl p-6 lg:p-8 text-white shadow-lg relative overflow-hidden">
                            <span class="material-symbols-outlined absolute right-[-10px] top-[-10px] text-[120px] opacity-10">event_available</span>
                            <p class="text-[10px] uppercase tracking-widest font-bold opacity-70 mb-2">Agenda Aktif Hari Ini</p>
                            <h3 class="text-xl lg:text-2xl font-bold mb-4 leading-tight">${event.nama}</h3>
                            <div class="flex flex-col lg:flex-row gap-2 lg:gap-4 text-[10px] lg:text-xs font-semibold">
                                <span class="bg-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2"><span class="material-symbols-outlined text-sm">location_on</span> ${event.lokasi}</span>
                                <span class="bg-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2"><span class="material-symbols-outlined text-sm">calendar_today</span> ${event.tanggal}</span>
                            </div>
                        </div>
                    `;
                } else {
                    html = `<div class="bg-white p-8 rounded-2xl border-2 border-dashed text-center text-gray-400 text-sm">Tidak ada agenda aktif.</div>`;
                }

                google.script.run.withSuccessHandler((stats) => {
                    container.innerHTML = html + `
                        <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-4">
                            <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm">
                                <div class="w-8 h-8 lg:w-10 lg:h-10 bg-green-50 text-green-600 rounded-lg flex items-center justify-center mb-3"><span class="material-symbols-outlined text-lg lg:text-xl">person_check</span></div>
                                <p class="text-xl lg:text-2xl font-bold text-gray-800">${stats.hadir || 0}</p>
                                <p class="text-[9px] lg:text-[10px] font-bold text-gray-400 uppercase tracking-tight">Hadir</p>
                            </div>
                            <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm">
                                <div class="w-8 h-8 lg:w-10 lg:h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-3"><span class="material-symbols-outlined text-lg lg:text-xl">groups</span></div>
                                <p class="text-xl lg:text-2xl font-bold text-gray-800">${stats.totalGuru || 0}</p>
                                <p class="text-[9px] lg:text-[10px] font-bold text-gray-400 uppercase tracking-tight">Total Anggota</p>
                            </div>
                            <div class="col-span-2 lg:col-span-1 bg-white p-4 lg:p-5 rounded-2xl border shadow-sm flex lg:block items-center justify-between">
                                <div class="w-8 h-8 lg:w-10 lg:h-10 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center lg:mb-3"><span class="material-symbols-outlined text-lg lg:text-xl">verified_user</span></div>
                                <div class="text-right lg:text-left">
                                    <p class="text-xl lg:text-2xl font-bold text-gray-800">${stats.persentase || 0}%</p>
                                    <p class="text-[9px] lg:text-[10px] font-bold text-gray-400 uppercase tracking-tight">Presensi</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).getDashboardStats();
            }).getEventAktif();
        }

        function initDaftarHadir() {
            const date = document.getElementById('dateFilter');
            if (!date.value) date.value = new Date().toISOString().split('T')[0];
            google.script.run.withSuccessHandler((data) => {
                const list = document.getElementById('hadirList');
                if (!list) return;
                if (data && data.length > 0) {
                    list.innerHTML = data.map((item, i) => `
                        <tr class="hover:bg-gray-50/50">
                            <td class="p-4 text-gray-400 font-bold">${i+1}</td>
                            <td class="p-4">
                                <p class="font-bold text-gray-800">${item.nama}</p>
                                <p class="text-[10px] text-gray-400">${item.nip}</p>
                            </td>
                            <td class="p-4 text-gray-600">${item.sekolah}</td>
                            <td class="p-4 text-right font-bold text-blue-600 font-mono">${item.jam}</td>
                        </tr>
                    `).join('');
                } else { list.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-gray-300 italic text-sm">Belum ada data presensi.</td></tr>`; }
            }).getDaftarHadirByTanggal({ tanggal: date.value });
        }

        let allGuru = [];
        function initDataGuru() {
            google.script.run.withSuccessHandler((d) => { allGuru = d || []; renderGuruList(); }).getListGuru();
        }

        function renderGuruList() {
            const kw = (document.getElementById('guruSearch')?.value || '').toLowerCase();
            const container = document.getElementById('guruContainer');
            if (!container) return;
            const filtered = allGuru.filter(g => g.nama.toLowerCase().includes(kw) || g.sekolah.toLowerCase().includes(kw) || g.nip.includes(kw));
            if (filtered.length > 0) {
                container.innerHTML = filtered.map(g => `
                    <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-bold">${g.nama.charAt(0)}</div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-xs lg:text-sm leading-tight">${g.nama}</h4>
                                <p class="text-[10px] text-gray-400 font-medium">${g.nip}</p>
                            </div>
                        </div>
                        <div class="text-[10px] lg:text-[11px] text-gray-500 space-y-1 border-t pt-3">
                            <p class="flex items-center gap-2"><span class="material-symbols-outlined text-[14px]">school</span> ${g.sekolah}</p>
                        </div>
                    </div>
                `).join('');
            } else { container.innerHTML = `<div class="col-span-full p-10 text-center text-gray-300 text-sm">Data tidak ditemukan.</div>`; }
        }

        let html5QrCode;
        async function startScanner() {
            const btn = document.getElementById('btnStart');
            btn.disabled = true; btn.innerHTML = 'Membuka...';
            try {
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } }, (text) => {
                    html5QrCode.stop();
                    alert('Berhasil: ' + text);
                    google.script.run.withSuccessHandler(() => { navigate('hadir'); }).simpanAbsensi({ barcode: text });
                });
                btn.innerHTML = 'Stop Scanner'; btn.classList.replace('bg-blue-600', 'bg-red-600'); btn.onclick = stopScanner; btn.disabled = false;
            } catch (e) { alert(e); btn.disabled = false; btn.innerHTML = 'Mulai'; }
        }

        async function stopScanner() {
            if (html5QrCode) await html5QrCode.stop();
            const btn = document.getElementById('btnStart');
            btn.innerHTML = 'Mulai Scanner'; btn.classList.replace('bg-red-600', 'bg-blue-600'); btn.onclick = startScanner;
        }

        function processManual() {
            const input = document.getElementById('manualInput');
            if (!input.value) return;
            google.script.run.withSuccessHandler(() => { alert('Berhasil!'); navigate('hadir'); }).simpanAbsensi({ barcode: input.value });
        }

        window.onload = () => {
            const u = localStorage.getItem('userKKG');
            if (!u) navigate('login'); else navigate('dashboard');
        };
    </script>
</body>
</html>
