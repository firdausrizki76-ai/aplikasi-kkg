<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKG Portal - Vercel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="pages.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        #reader { background-color: black !important; border-radius: 1rem; overflow: hidden; }
        #reader video { object-fit: cover !important; }
        .scan-status { transition: all 0.3s ease; transform: translateY(20px); opacity: 0; }
        .scan-status.active { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="app"></div>

    <!-- Status Toast -->
    <div id="statusToast" class="scan-status fixed top-4 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm p-4 rounded-2xl shadow-2xl border flex items-center gap-3">
        <div id="statusIcon" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0"></div>
        <div class="flex-1">
            <p id="statusTitle" class="font-bold text-sm leading-tight"></p>
            <p id="statusMsg" class="text-[10px] opacity-80 font-medium"></p>
        </div>
    </div>

    <script>
        const API_URL = '/api/proxy';

        const google = {
            script: {
                run: {
                    withSuccessHandler: function(cb) { this._success = cb; return this; },
                    withFailureHandler: function(cb) { this._failure = cb; return this; },
                    _call: async function(action, args) {
                        try {
                            const url = new URL(window.location.origin + API_URL);
                            url.searchParams.append('action', action);
                            if (args.length > 0 && typeof args[0] === 'object') {
                                Object.keys(args[0]).forEach(k => url.searchParams.append(k, args[0][k]));
                            }
                            const res = await fetch(url);
                            const data = await res.json();
                            if (this._success) this._success(data);
                        } catch (e) { console.error(e); if (this._failure) this._failure(e); }
                    },
                    login: function(...a) { this._call('login', a); },
                    getEventAktif: function(...a) { this._call('getEventAktif', a); },
                    getDashboardStats: function(...a) { this._call('getDashboardStats', a); },
                    getListGuru: function(...a) { this._call('getListGuru', a); },
                    getDaftarHadirByTanggal: function(...a) { this._call('getDaftarHadirByTanggal', a); },
                    simpanAbsensi: function(...a) { this._call('simpanAbsensi', a); },
                }
            }
        };

        function showStatus(success, title, msg) {
            const toast = document.getElementById('statusToast');
            const icon = document.getElementById('statusIcon');
            const tTitle = document.getElementById('statusTitle');
            const tMsg = document.getElementById('statusMsg');
            
            toast.className = `scan-status active fixed top-4 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm p-4 rounded-2xl shadow-2xl border flex items-center gap-3 \${success ? 'bg-green-600 border-green-500 text-white' : 'bg-red-600 border-red-500 text-white'}`;
            icon.className = `w-10 h-10 rounded-full flex items-center justify-center shrink-0 \${success ? 'bg-white/20' : 'bg-white/20'}`;
            icon.innerHTML = `<span class="material-symbols-outlined">\${success ? 'check_circle' : 'error'}</span>`;
            tTitle.innerText = title;
            tMsg.innerText = msg;

            setTimeout(() => { toast.classList.remove('active'); }, 3000);
        }

        function navigate(page) {
            const renderFn = PAGES[page] || (() => `<h1>404</h1>`);
            document.getElementById('app').innerHTML = renderFn();
            if (page === 'login') initLogin();
            if (page === 'dashboard') initDashboard();
            if (page === 'hadir') initDaftarHadir();
            if (page === 'guru') initDataGuru();
            window.scrollTo(0,0);
        }

        function logout() { localStorage.removeItem('userKKG'); navigate('login'); }

        function initLogin() {
            const form = document.getElementById('loginForm');
            if (!form) return;
            form.onsubmit = (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                btn.disabled = true; btn.innerHTML = 'MEMPROSES...';
                google.script.run.withSuccessHandler((res) => {
                    if (res && res.success) {
                        localStorage.setItem('userKKG', JSON.stringify(res));
                        navigate('dashboard');
                    } else {
                        showStatus(false, 'Login Gagal', res?.message || 'Cek kembali email & password');
                        btn.disabled = false; btn.innerHTML = 'MASUK';
                    }
                }).login({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            };
        }

        function initDashboard() {
            google.script.run.withSuccessHandler((event) => {
                const container = document.getElementById('dashboardContent');
                if (!container) return;
                let html = '';
                if (event && !event.error) {
                    html = `
                        <div class="bg-blue-600 rounded-2xl p-6 lg:p-8 text-white shadow-lg relative overflow-hidden">
                            <span class="material-symbols-outlined absolute right-[-10px] top-[-10px] text-[120px] opacity-10">event_available</span>
                            <p class="text-[10px] uppercase tracking-widest font-bold opacity-70 mb-2">Agenda Aktif</p>
                            <h3 class="text-xl lg:text-2xl font-bold mb-4 leading-tight">\${event.nama}</h3>
                            <div class="flex flex-col lg:flex-row gap-2 lg:gap-4 text-[10px] lg:text-xs font-semibold">
                                <span class="bg-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2"><span class="material-symbols-outlined text-sm">location_on</span> \${event.lokasi}</span>
                                <span class="bg-white/10 px-3 py-1.5 rounded-lg flex items-center gap-2"><span class="material-symbols-outlined text-sm">calendar_today</span> \${event.tanggal}</span>
                            </div>
                        </div>
                    `;
                } else {
                    html = `<div class="bg-white p-10 rounded-2xl border-2 border-dashed text-center text-gray-400 text-sm font-medium">Belum ada agenda aktif.</div>`;
                }
                google.script.run.withSuccessHandler((stats) => {
                    container.innerHTML = html + `
                        <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 lg:gap-4">
                            <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm"><div class="w-8 h-8 lg:w-10 lg:h-10 bg-green-50 text-green-600 rounded-lg flex items-center justify-center mb-3"><span class="material-symbols-outlined text-lg">person_check</span></div><p class="text-xl lg:text-2xl font-bold text-gray-800">\${stats.hadirHariIni || 0}</p><p class="text-[9px] font-bold text-gray-400 uppercase tracking-tight">Hadir</p></div>
                            <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm"><div class="w-8 h-8 lg:w-10 lg:h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-3"><span class="material-symbols-outlined text-lg">groups</span></div><p class="text-xl lg:text-2xl font-bold text-gray-800">\${stats.totalGuru || 0}</p><p class="text-[9px] font-bold text-gray-400 uppercase tracking-tight">Total Guru</p></div>
                            <div class="col-span-2 lg:col-span-1 bg-white p-4 lg:p-5 rounded-2xl border shadow-sm flex lg:block items-center justify-between"><div class="w-8 h-8 lg:w-10 lg:h-10 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center lg:mb-3"><span class="material-symbols-outlined text-lg">verified_user</span></div><div class="text-right lg:text-left"><p class="text-xl lg:text-2xl font-bold text-gray-800">\${Math.round((stats.hadirHariIni / (stats.totalGuru || 1)) * 100)}%</p><p class="text-[9px] font-bold text-gray-400 uppercase tracking-tight">Persentase</p></div></div>
                        </div>
                    `;
                }).getDashboardStats();
            }).getEventAktif();
        }

        function initDaftarHadir() {
            const date = document.getElementById('dateFilter');
            if (date && !date.value) date.value = new Date().toISOString().split('T')[0];
            google.script.run.withSuccessHandler((data) => {
                const list = document.getElementById('hadirList');
                if (!list) return;
                if (data && data.length > 0) {
                    list.innerHTML = data.map((item, i) => `
                        <tr class="hover:bg-gray-50/50 transition-all"><td class="p-4 text-gray-400 font-bold">\${i+1}</td><td class="p-4"><p class="font-bold text-gray-800">\${item.nama}</p><p class="text-[10px] text-gray-400">\${item.nip}</p></td><td class="p-4 text-gray-600">\${item.sekolah}</td><td class="p-4 text-right font-bold text-blue-600 font-mono">\${item.jam}</td></tr>
                    `).join('');
                } else { list.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-gray-300 italic text-sm">Belum ada data presensi.</td></tr>`; }
            }).getDaftarHadirByTanggal({ tanggal: date ? date.value : '' });
        }

        let allGuru = [];
        function initDataGuru() {
            google.script.run.withSuccessHandler((d) => { allGuru = d || []; renderGuruList(); }).getListGuru();
        }

        function renderGuruList() {
            const kw = (document.getElementById('guruSearch')?.value || '').toLowerCase();
            const container = document.getElementById('guruContainer');
            if (!container) return;
            const filtered = allGuru.filter(g => g.nama.toLowerCase().includes(kw) || g.sekolah.toLowerCase().includes(kw) || g.nip.includes(kw));
            if (filtered.length > 0) {
                container.innerHTML = filtered.map(g => `
                    <div class="bg-white p-4 lg:p-5 rounded-2xl border shadow-sm hover:border-blue-200 transition-all"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-bold">\${g.nama.charAt(0)}</div><div><h4 class="font-bold text-gray-800 text-xs lg:text-sm leading-tight">\${g.nama}</h4><p class="text-[10px] text-gray-400 font-medium">\${g.nip}</p></div></div><div class="text-[10px] lg:text-[11px] text-gray-500 space-y-1 border-t pt-3"><p class="flex items-center gap-2"><span class="material-symbols-outlined text-[14px]">school</span> \${g.sekolah}</p></div></div>
                `).join('');
            } else { container.innerHTML = `<div class="col-span-full p-10 text-center text-gray-300 text-sm">Data tidak ditemukan.</div>`; }
        }

        let html5QrCode;
        let isScanning = false;

        async function startScanner() {
            const btn = document.getElementById('btnStart');
            if (!btn || isScanning) return;
            
            btn.disabled = true; btn.innerHTML = 'Membuka Kamera...';
            try {
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                const qrConfig = { fps: 20, qrbox: (vw, vh) => ({ width: Math.min(vw, vh) * 0.7, height: Math.min(vw, vh) * 0.7 }) };
                
                await html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);
                isScanning = true;
                btn.innerHTML = 'Stop Scanner'; btn.classList.replace('bg-blue-600', 'bg-red-600'); btn.onclick = stopScanner; btn.disabled = false;
            } catch (e) { showStatus(false, 'Kamera Error', e); btn.disabled = false; btn.innerHTML = 'Mulai Scanner'; }
        }

        async function onScanSuccess(text) {
            if (!isScanning) return;
            isScanning = false; // Pause scanning while processing
            
            showStatus(true, 'Scanning...', 'Sedang memproses barcode...');
            
            google.script.run.withSuccessHandler((res) => {
                if (res && res.success) {
                    showStatus(true, 'BERHASIL!', res.message || 'Presensi tercatat.');
                    // Restart scanning after 1.5 seconds for mass scanning
                    setTimeout(() => { isScanning = true; }, 1500);
                } else {
                    showStatus(false, 'GAGAL!', res?.message || 'Gagal mencatat absensi.');
                    // Restart scanning even if failed after 2 seconds
                    setTimeout(() => { isScanning = true; }, 2000);
                }
            }).simpanAbsensi({ barcode: text });
        }

        async function stopScanner() {
            if (html5QrCode) await html5QrCode.stop();
            isScanning = false;
            const btn = document.getElementById('btnStart');
            if (btn) { btn.innerHTML = 'Mulai Scanner'; btn.classList.replace('bg-red-600', 'bg-blue-600'); btn.onclick = startScanner; }
        }

        function processManual() {
            const input = document.getElementById('manualInput');
            if (!input.value) return;
            google.script.run.withSuccessHandler((res) => {
                if (res && res.success) { showStatus(true, 'BERHASIL!', 'Presensi manual tercatat.'); input.value = ''; }
                else { showStatus(false, 'GAGAL!', res?.message || 'Gagal mencatat.'); }
            }).simpanAbsensi({ barcode: input.value });
        }

        window.onload = () => {
            const u = localStorage.getItem('userKKG');
            if (!u) navigate('login'); else navigate('dashboard');
        };
    </script>
</body>
</html>
