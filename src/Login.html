<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KKG Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .input-group {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }
        .input-field {
            padding-left: 44px;
        }
        .btn-login {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.3);
        }
        .loading {
            display: none;
        }
        .loading.active {
            display: inline-block;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <!-- Login Card -->
    <div class="login-card w-full max-w-md rounded-2xl shadow-2xl p-8">
        
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-white text-5xl">school</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">KKG Portal</h1>
            <p class="text-gray-600">Sistem Absensi Kelompok Kerja Guru</p>
        </div>

        <!-- Alert -->
        <div id="alert" class="hidden mb-4 p-4 rounded-lg">
            <p id="alertMessage" class="text-sm"></p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            
            <!-- Email Input -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">mail</span>
                    <input 
                        type="email" 
                        id="email" 
                        class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="nama@email.com"
                        required
                    >
                </div>
            </div>

            <!-- Password Input -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <div class="input-group">
                    <span class="material-symbols-outlined input-icon">lock</span>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="••••••••"
                        required
                    >
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="ml-2 text-sm text-gray-600">Ingat saya</span>
                </label>
                <a href="#" class="text-sm text-blue-600 hover:text-blue-800 font-medium">Lupa password?</a>
            </div>

            <!-- Login Button -->
            <button 
                type="submit" 
                id="btnLogin"
                class="btn-login w-full py-3 text-white font-semibold rounded-lg shadow-lg flex items-center justify-center gap-2"
            >
                <span id="btnText">Masuk</span>
                <span class="material-symbols-outlined loading" id="loadingIcon">progress_activity</span>
            </button>

        </form>

        <!-- Footer -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Belum punya akun? 
                <a href="#" class="text-blue-600 hover:text-blue-800 font-medium">Hubungi Admin</a>
            </p>
        </div>

        <!-- Version -->
        <div class="mt-8 text-center">
            <p class="text-xs text-gray-400">v1.0.0 - Google Apps Script Edition</p>
        </div>

    </div>

    <script>
        const SCRIPT_URL = '<?= scriptUrl ?>';

        // Animasi loading
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
            .loading.active {
                animation: spin 1s linear infinite;
            }
        `;
        document.head.appendChild(style);

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            const alertMessage = document.getElementById('alertMessage');
            
            alert.className = 'mb-4 p-4 rounded-lg';
            
            if (type === 'error') {
                alert.classList.add('bg-red-100', 'border', 'border-red-400', 'text-red-700');
            } else if (type === 'success') {
                alert.classList.add('bg-green-100', 'border', 'border-green-400', 'text-green-700');
            }
            
            alertMessage.textContent = message;
            alert.classList.remove('hidden');
            
            setTimeout(() => {
                alert.classList.add('hidden');
            }, 5000);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            
            // Disable button dan tampilkan loading
            btnLogin.disabled = true;
            btnText.textContent = 'Memproses...';
            loadingIcon.classList.add('active');
            
            // Call Google Apps Script function
            google.script.run
                .withSuccessHandler(function(response) {
                    btnLogin.disabled = false;
                    btnText.textContent = 'Masuk';
                    loadingIcon.classList.remove('active');
                    
                    if (response.success) {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userRole', response.role);
                        localStorage.setItem('userName', response.nama);
                        showAlert('Login berhasil!', 'success');
                        
                        // Ubah form menjadi tombol langsung (menghindari blokir sandbox iframe)
                        const form = document.getElementById('loginForm');
                        form.innerHTML = `
                            <div class="text-center">
                                <span class="material-symbols-outlined text-green-500 text-6xl mb-4">check_circle</span>
                                <h3 class="text-xl font-bold mb-6">Login Berhasil</h3>
                                <a href="${SCRIPT_URL}?page=dashboard" target="_top" class="inline-block w-full py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow-lg transition-all">
                                    Lanjut ke Dashboard
                                </a>
                            </div>
                        `;
                        
                        // Coba auto-redirect (jika waktu user gesture belum expired)
                        try {
                            window.top.location.href = SCRIPT_URL + '?page=dashboard';
                        } catch(e) {
                            console.log('Auto-redirect diblokir sandbox, menunggu klik user.');
                        }
                    } else {
                        showAlert(response.message, 'error');
                    }
                })
                .withFailureHandler(function(error) {
                    btnLogin.disabled = false;
                    btnText.textContent = 'Masuk';
                    loadingIcon.classList.remove('active');
                    showAlert('Terjadi kesalahan jaringan/server. Silakan coba lagi.', 'error');
                })
                .login(email, password);
        }

        // Auto focus ke email field
        document.getElementById('email').focus();
    </script>

</body>
</html>
